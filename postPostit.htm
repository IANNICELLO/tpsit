<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chat - PostIT</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div class="container">
    <a href="/" class="back-link">← Torna alla bacheca</a>
    
    <div class="card" style="border-left: 5px solid var(--accent);">
        <small>Discussione avviata da <b><%= post.username %></b></small>
        <p class="post-text"><%= post.content %></p>
    </div>

    <div id="messages" style="height: 350px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--glass);">
        <% if (post.comments) { %>
            <% post.comments.forEach(c => { %>
                <div style="margin-bottom: 10px;">
                    <b style="color: var(--accent);"><%= c.username %>:</b> <span><%= c.message %></span>
                </div>
            <% }) %>
        <% } %>
    </div>

    <% if (user) { %>
        <div style="display:flex; gap: 10px;">
            <input id="msgInput" class="form-control" style="margin-bottom:0;" placeholder="Scrivi un commento...">
            <button id="sendBtn" class="btn-primary">Invia</button>
        </div>
    <% } %>
</div>

<script>
    const socket = io();
    const postId = "<%= post.id %>";
    const user = "<%= user %>";
    socket.emit('join-post', { postId });

    const btn = document.getElementById('sendBtn');
    const input = document.getElementById('msgInput');
    const box = document.getElementById('messages');

    function send() {
        if (input.value) {
            socket.emit('chat-message', { postId, username: user, message: input.value });
            input.value = '';
        }
    }
    if(btn) btn.onclick = send;
    socket.on('chat-message', d => {
        box.innerHTML += `<div><b style="color: var(--accent);">${d.username}:</b> ${d.message}</div>`;
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
