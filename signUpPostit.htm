<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Digital Coffee</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="auth-container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <form action="/signup" method="POST" class="card" style="width: 100%; max-width: 400px; text-align: center;">
            <h2 style="color: var(--accent); margin-bottom: 20px;">Crea Account</h2>
            <input type="text" name="username" class="form-control" placeholder="Scegli Username" required style="margin-bottom: 15px;">
            <input type="password" name="password" class="form-control" placeholder="Password" required style="margin-bottom: 20px;">
            <button type="submit" class="btn-auth" style="width: 100%;">Inizia Ora</button>
            <p style="margin-top: 20px; font-size: 0.9rem; color: var(--text-secondary);">
                Sei già dei nostri? <a href="/login" style="color: var(--accent);">Login</a>
            </p>
        </form>
    </div>
</body>
</html>
